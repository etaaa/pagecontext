<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="header">
    <h1>Page<span class="header-accent">Context</span></h1>
    <a href="https://github.com/etaaa/pagecontext" target="_blank" class="header-github" title="View on GitHub">
      <svg viewBox="0 0 16 16">
        <path
          d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z" />
      </svg>
    </a>
  </div>
  <div class="actions">
    <button id="toggle-pick" class="action-btn">
      <span class="action-icon">
        <svg viewBox="0 0 24 24">
          <path d="M5 3a2 2 0 0 0-2 2" />
          <path d="M19 3a2 2 0 0 1 2 2" />
          <path d="M21 19a2 2 0 0 1-2 2" />
          <path d="M5 21a2 2 0 0 1-2-2" />
          <path d="M9 3h1" />
          <path d="M9 21h1" />
          <path d="M14 3h1" />
          <path d="M14 21h1" />
          <path d="M3 9v1" />
          <path d="M21 9v1" />
          <path d="M3 14v1" />
          <path d="M21 14v1" />
        </svg>
      </span>
      <div>
        <div class="action-label">Pick Elements</div>
        <div class="action-desc">Select containers like DevTools inspect</div>
      </div>
    </button>
    <div id="pick-controls" class="pick-controls" hidden>
      <p class="pick-hint">Hover to preview, click to select. Click again to deselect.</p>
      <div class="pick-actions">
        <button id="copy-picked" class="btn-primary">Copy Selected</button>
        <button id="clear-picked" class="btn-secondary">Clear All</button>
      </div>
    </div>
    <button id="copy-article" class="action-btn">
      <span class="action-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 20h9" />
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
        </svg>
      </span>
      <div>
        <div class="action-label">Copy Article Text</div>
        <div class="action-desc">Clean article text, no clutter</div>
      </div>
      <kbd class="keybind">Alt+Shift+A</kbd>
    </button>
    <button id="copy-page" class="action-btn">
      <span class="action-icon">
        <svg viewBox="0 0 24 24">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <line x1="16" y1="13" x2="8" y2="13" />
          <line x1="16" y1="17" x2="8" y2="17" />
          <polyline points="10 9 9 9 8 9" />
        </svg>
      </span>
      <div>
        <div class="action-label">Copy Full Page</div>
        <div class="action-desc">Complete HTML as seen in your browser</div>
      </div>
      <kbd class="keybind">Alt+Shift+P</kbd>
    </button>
  </div>
  <div id="status" class="status" hidden></div>
  <script src="popup.js"></script>
</body>

</html>
