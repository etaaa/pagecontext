<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="header">
    <h1>PageContext</h1>
  </div>
  <div class="actions">
    <button id="copy-article" class="action-btn">
      <span class="action-icon">
        <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </span>
      <div>
        <div class="action-label">Copy Article Text</div>
        <div class="action-desc">Clean article text, no clutter</div>
      </div>
    </button>
    <button id="copy-page" class="action-btn">
      <span class="action-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </span>
      <div>
        <div class="action-label">Copy Full Page</div>
        <div class="action-desc">Complete HTML as seen in your browser</div>
      </div>
    </button>
    <button id="toggle-pick" class="action-btn">
      <span class="action-icon">
        <svg viewBox="0 0 24 24"><path d="M5 3a2 2 0 0 0-2 2"/><path d="M19 3a2 2 0 0 1 2 2"/><path d="M21 19a2 2 0 0 1-2 2"/><path d="M5 21a2 2 0 0 1-2-2"/><path d="M9 3h1"/><path d="M9 21h1"/><path d="M14 3h1"/><path d="M14 21h1"/><path d="M3 9v1"/><path d="M21 9v1"/><path d="M3 14v1"/><path d="M21 14v1"/></svg>
      </span>
      <div>
        <div class="action-label">Pick Elements</div>
        <div class="action-desc">Select containers like DevTools inspect</div>
      </div>
    </button>
  </div>
  <div id="pick-controls" class="pick-controls" hidden>
    <p class="pick-hint">Hover to preview, click to select. Click again to deselect.</p>
    <div class="pick-actions">
      <button id="copy-picked" class="btn-primary">Copy Selected</button>
      <button id="clear-picked" class="btn-secondary">Clear All</button>
    </div>
  </div>
  <div id="status" class="status" hidden></div>
  <script src="popup.js"></script>
</body>

</html>
